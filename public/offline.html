<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — BoxingWiki</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      text-align: center;
      padding: 2rem;
    }
    .offline-container { max-width: 400px; }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #999; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #ff3333;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #ff4d4d; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">🥊</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Check your network and try again — your training is waiting.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
